<h2 class="title">Make Your Diagnosis Guesses</h2>

<form (ngSubmit)="onSubmit()">
  @if (roundName() === 'follow-up') { 
    @for (guess of guesses().slice(0,2); track $index) {
  <div class="diagnosis">
    <label for="diagnosis-{{ $index }}">Final Guess {{ $index + 1 }}</label>
    <input
      id="diagnosis-{{ $index }}"
      type="text"
      [(ngModel)]="guesses()[$index]"
      name="guess-{{ $index }}"
    />
  </div>
  } 
} @else { 
  @for (guess of guesses(); track $index) {
  <div class="diagnosis">
    <label for="diagnosis-{{ $index }}">Diagnosis Guess {{ $index + 1 }}</label>
    <input
      id="diagnosis-{{ $index }}"
      type="text"
      [(ngModel)]="guesses()[$index]"
      name="guess-{{ $index }}"
    />
  </div>
  }
}
  <button type="submit" class="submit-button">Submit Diagnosis</button>
</form>
