<div class="container">
  <button [routerLink]="'/game-rules'" class="header">Einführung</button>
  <form (ngSubmit)="onSubmit()">
  <div class="grid">
    @for (case of cases; track $index) {
      <button class="scenario-button" type="button" [class.selected]="selectedScenarioId === ($index + 1)" (click)="selectScenario($index + 1)">
          {{ case }}
      </button>
    }
  </div>
  @if (selectedScenarioId) {
  <div class="team-name-section">
    <h2>Enter your Team name</h2>
    <input
      id="teamName"
      type="text"
      [(ngModel)]="teamName"
      name="teamName"
      [placeholder]="teamPlaceholder"
    />
  </div>
}
  @if (selectedScenarioId && teamName && teamName.trim() !== '') {
    <button type="submit" class="submit-button" [disabled]="!selectedScenarioId">
      To Scenarios!
    </button>
    }
  </form>
</div>
