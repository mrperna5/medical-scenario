<form class="selection-form">
    <h3>Runde 3: Labordiagnostik</h3>
  
    <div class="grid-container">
    @for (item of laboratories; track item.code) {  
      <div class="grid-item">
        <label>
          <input type="checkbox" (change)="onSelectionChange(item, $event)" />
          {{ item.code }} {{ item.item }}
        </label>
      </div>
    }
    </div>
  
    <button type="button" class="submit-button" (click)="onSubmit()">Submit</button>
  </form>
