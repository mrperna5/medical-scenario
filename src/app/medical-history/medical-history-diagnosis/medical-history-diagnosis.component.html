<h2>Make Your Diagnosis Guesses</h2>

<form (ngSubmit)="onSubmit()">
    @for (guess of medicalHistoryDiagnosisGuesses; track $index) {
  <div class="form-group">
    <label for="diagnosis-{{$index}}">Diagnosis Guess {{$index + 1}}</label>
    <input id="diagnosis-{{$index}}" type="text" [(ngModel)]="medicalHistoryDiagnosisGuesses[$index]" name="guess-{{$index}}" class="form-control"/>
  </div>
    }
  <button type="submit" class="submit-button">Submit Diagnosis</button>
</form>
